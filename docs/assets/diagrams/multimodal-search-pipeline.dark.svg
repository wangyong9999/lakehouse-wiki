<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-label="多模检索流水线：从上传到查询返回的端到端（深色）">
  <title>多模检索流水线</title>
  <desc>端到端流水线：上传 → 落湖 → 扩充 → Embedding → 索引 ↓｜查询 → 路由 → Hybrid → Rerank → 返回。</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9fa8da"/>
    </marker>
    <marker id="arr-q" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef5350"/>
    </marker>
    <style>
      .hdr   { font-family: "Noto Sans SC","PingFang SC",system-ui,sans-serif; font-size: 17px; font-weight: 700; fill: #e8eaf6; }
      .sub   { font-family: "Noto Sans SC","PingFang SC",system-ui,sans-serif; font-size: 11px; fill: #9fa8da; letter-spacing: 0.3px; }
      .phase { font-family: "Noto Sans SC","PingFang SC",system-ui,sans-serif; font-size: 11px; font-weight: 700; fill: #1e2135; letter-spacing: 1px; }
      .pct   { font-family: "Noto Sans SC","PingFang SC",system-ui,sans-serif; font-size: 10px; font-weight: 600; fill: #c5cae9; letter-spacing: 0.5px; }
      .nl    { font-family: "Noto Sans SC","PingFang SC",system-ui,sans-serif; font-size: 13px; font-weight: 600; fill: #e8eaf6; }
      .ns    { font-family: "Noto Sans SC","PingFang SC",system-ui,sans-serif; font-size: 10.5px; font-weight: 400; fill: #b0bec5; }
      .qnl   { font-family: "Noto Sans SC","PingFang SC",system-ui,sans-serif; font-size: 13px; font-weight: 600; fill: #ef9a9a; }
      .qns   { font-family: "Noto Sans SC","PingFang SC",system-ui,sans-serif; font-size: 10.5px; font-weight: 400; fill: #d7a48f; }
    </style>
  </defs>

  <!-- Top title -->
  <text class="hdr" x="600" y="32" text-anchor="middle">多模检索流水线 · 离线索引 + 在线查询</text>
  <text class="sub" x="600" y="52" text-anchor="middle">上轨：资产入湖 + 预处理 + embedding + 建索引　　下轨：query → 路由 → Hybrid → Rerank → 返回</text>

  <!-- ===== Upper track: indexing pipeline ===== -->
  <rect x="20" y="82" width="1160" height="28" rx="8" fill="#9fa8da"/>
  <text class="phase" x="40" y="101">离线索引流水线 · INDEXING · 从小时到分钟级新鲜度</text>

  <!-- Boxes upper track (left to right) -->
  <!-- 1. Upload -->
  <rect x="40" y="130" width="160" height="80" rx="8" fill="#1e2135" stroke="#9fa8da" stroke-width="1.5"/>
  <text class="nl" x="120" y="158" text-anchor="middle">上传 / 采集</text>
  <text class="ns" x="120" y="177" text-anchor="middle">API · 批采集 ·</text>
  <text class="ns" x="120" y="192" text-anchor="middle">第三方 webhook</text>

  <!-- 2. Object storage -->
  <rect x="220" y="130" width="160" height="80" rx="8" fill="#252a45" stroke="#9fa8da" stroke-width="1.5"/>
  <text class="nl" x="300" y="158" text-anchor="middle">对象存储</text>
  <text class="ns" x="300" y="177" text-anchor="middle">原文件</text>
  <text class="ns" x="300" y="192" text-anchor="middle" font-style="italic">raw_uri 入表</text>

  <!-- 3. Enrichment (branch) -->
  <rect x="400" y="130" width="180" height="80" rx="8" fill="#1e2135" stroke="#9fa8da" stroke-width="1.5"/>
  <text class="nl" x="490" y="155" text-anchor="middle">内容扩充</text>
  <text class="ns" x="490" y="175" text-anchor="middle">OCR · VLM Caption</text>
  <text class="ns" x="490" y="191" text-anchor="middle">ASR · 分类 / 标签</text>

  <!-- 4. Embedding (batch + stream) -->
  <rect x="600" y="130" width="180" height="80" rx="10" fill="#2a3150" stroke="#9fa8da" stroke-width="2"/>
  <text class="nl" x="690" y="155" text-anchor="middle">Embedding</text>
  <text class="ns" x="690" y="175" text-anchor="middle">CLIP + BGE 并列</text>
  <text class="ns" x="690" y="191" text-anchor="middle">批 + CDC 流</text>

  <!-- 5. Lake table -->
  <rect x="800" y="130" width="180" height="80" rx="8" fill="#2f3663" stroke="#e8eaf6" stroke-width="2"/>
  <text class="nl" x="890" y="155" text-anchor="middle">multimodal_assets</text>
  <text class="ns" x="890" y="175" text-anchor="middle">Iceberg / Lance</text>
  <text class="ns" x="890" y="191" text-anchor="middle" font-style="italic">向量列 · 元数据</text>

  <!-- 6. Index building -->
  <rect x="1000" y="130" width="180" height="80" rx="8" fill="#1e2135" stroke="#9fa8da" stroke-width="1.5"/>
  <text class="nl" x="1090" y="155" text-anchor="middle">ANN 索引构建</text>
  <text class="ns" x="1090" y="175" text-anchor="middle">Lance Fragment /</text>
  <text class="ns" x="1090" y="191" text-anchor="middle">Iceberg Puffin</text>

  <!-- Arrows upper -->
  <line x1="200" y1="170" x2="217" y2="170" stroke="#9fa8da" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="380" y1="170" x2="397" y2="170" stroke="#9fa8da" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="580" y1="170" x2="597" y2="170" stroke="#9fa8da" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="780" y1="170" x2="797" y2="170" stroke="#9fa8da" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="980" y1="170" x2="997" y2="170" stroke="#9fa8da" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Upper track annotations (under boxes) -->
  <text class="pct" x="120" y="232">① 多模文件进</text>
  <text class="pct" x="300" y="232">② 大二进制留湖</text>
  <text class="pct" x="490" y="232">③ 文字派生字段</text>
  <text class="pct" x="690" y="232">④ 多向量并存</text>
  <text class="pct" x="890" y="232">⑤ 事实表</text>
  <text class="pct" x="1090" y="232">⑥ 索引就绪</text>

  <!-- ===== Failure note between upper / lower ===== -->
  <rect x="40" y="262" width="1140" height="64" rx="10" fill="#2b2a1a" stroke="#f9a825" stroke-width="1" stroke-dasharray="5 3"/>
  <text class="nl" x="60" y="285" fill="#f9a825">⚠  失败模式与兜底</text>
  <text class="ns" x="60"  y="305" fill="#d7a48f">· Caption / OCR 差 → 召回漏（上抽检）</text>
  <text class="ns" x="370" y="305" fill="#d7a48f">· Embedding 版本漂移 → 双列 A/B（上 embedding_version）</text>
  <text class="ns" x="810" y="305" fill="#d7a48f">· 索引 lag → 前端标"未索引"</text>
  <text class="ns" x="60"  y="321" fill="#d7a48f">· Query Router 误判 → 前置强 API 字段</text>
  <text class="ns" x="370" y="321" fill="#d7a48f">· 权限越权 → Catalog row-level policy（信 Catalog，不信应用层）</text>

  <!-- ===== Lower track: online query pipeline ===== -->
  <rect x="20" y="346" width="1160" height="28" rx="8" fill="#ef5350"/>
  <text class="phase" x="40" y="365">在线查询路径 · ONLINE QUERY · p95 端到端目标 &lt; 400ms</text>

  <!-- Query input: text, image -->
  <rect x="40" y="396" width="140" height="80" rx="8" fill="#1e2135" stroke="#ef5350" stroke-width="1.5"/>
  <text class="qnl" x="110" y="425" text-anchor="middle">用户 Query</text>
  <text class="qns" x="110" y="445" text-anchor="middle">文本 · 图片 ·</text>
  <text class="qns" x="110" y="460" text-anchor="middle">图文混合</text>

  <!-- Router -->
  <rect x="200" y="396" width="160" height="80" rx="8" fill="#1e2135" stroke="#ef5350" stroke-width="1.5"/>
  <text class="qnl" x="280" y="421" text-anchor="middle">Query Router</text>
  <text class="qns" x="280" y="441" text-anchor="middle">判类型</text>
  <text class="qns" x="280" y="457" text-anchor="middle">+ 前置权限过滤</text>

  <!-- Encoder -->
  <rect x="380" y="396" width="180" height="80" rx="8" fill="#2b1d1d" stroke="#ef5350" stroke-width="1.5"/>
  <text class="qnl" x="470" y="421" text-anchor="middle">Query Encoder</text>
  <text class="qns" x="470" y="441" text-anchor="middle">text · image 分路</text>
  <text class="qns" x="470" y="457" text-anchor="middle">→ 与库侧同模型</text>

  <!-- Hybrid retrieve -->
  <rect x="580" y="396" width="180" height="80" rx="10" fill="#2d1e1a" stroke="#ef5350" stroke-width="2"/>
  <text class="qnl" x="670" y="421" text-anchor="middle">Hybrid Retrieve</text>
  <text class="qns" x="670" y="441" text-anchor="middle">Dense ANN + Sparse</text>
  <text class="qns" x="670" y="457" text-anchor="middle">+ metadata filter</text>

  <!-- Rerank -->
  <rect x="780" y="396" width="160" height="80" rx="8" fill="#2b1d1d" stroke="#ef5350" stroke-width="1.5"/>
  <text class="qnl" x="860" y="421" text-anchor="middle">Rerank</text>
  <text class="qns" x="860" y="441" text-anchor="middle">Cross-encoder</text>
  <text class="qns" x="860" y="457" text-anchor="middle">Top-N → Top-K</text>

  <!-- Response -->
  <rect x="960" y="396" width="220" height="80" rx="8" fill="#1e2135" stroke="#ef5350" stroke-width="1.5"/>
  <text class="qnl" x="1070" y="421" text-anchor="middle">返回</text>
  <text class="qns" x="1070" y="441" text-anchor="middle">Top-K + 原始 URI +</text>
  <text class="qns" x="1070" y="457" text-anchor="middle">元数据引用</text>

  <!-- Arrows lower -->
  <line x1="180" y1="436" x2="197" y2="436" stroke="#ef5350" stroke-width="2" marker-end="url(#arr-q)"/>
  <line x1="360" y1="436" x2="377" y2="436" stroke="#ef5350" stroke-width="2" marker-end="url(#arr-q)"/>
  <line x1="560" y1="436" x2="577" y2="436" stroke="#ef5350" stroke-width="2" marker-end="url(#arr-q)"/>
  <line x1="760" y1="436" x2="777" y2="436" stroke="#ef5350" stroke-width="2" marker-end="url(#arr-q)"/>
  <line x1="940" y1="436" x2="957" y2="436" stroke="#ef5350" stroke-width="2" marker-end="url(#arr-q)"/>

  <!-- Consumption arrows from table → query -->
  <path d="M 890 210 Q 890 280, 670 395" fill="none" stroke="#c5cae9" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arr)"/>
  <path d="M 1090 210 Q 1090 280, 670 395" fill="none" stroke="#c5cae9" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arr)"/>

  <!-- Latency annotations -->
  <text class="pct" x="110" y="498">query 进</text>
  <text class="pct" x="280" y="498">&lt; 5ms</text>
  <text class="pct" x="470" y="498">&lt; 50ms (GPU)</text>
  <text class="pct" x="670" y="498">&lt; 150ms</text>
  <text class="pct" x="860" y="498">&lt; 100ms</text>
  <text class="pct" x="1070" y="498">端到端合计</text>

  <!-- ===== Tech stack table ===== -->
  <rect x="40" y="530" width="1140" height="130" rx="10" fill="#1c1f33" stroke="#9fa8da" stroke-width="1"/>
  <text class="hdr" x="60" y="555" font-size="14">推荐技术栈（节点 · 首选 · 备选）</text>

  <text class="nl" x="60"  y="583" font-size="12">Embedding</text>
  <text class="ns" x="180" y="583">SigLIP / Jina-CLIP（多模）+ BGE-v2-m3（文）</text>
  <text class="ns" x="580" y="583" font-style="italic">备：CLIP + text-embed-3</text>

  <text class="nl" x="60"  y="603" font-size="12">向量库</text>
  <text class="ns" x="180" y="603">LanceDB（嵌入式）</text>
  <text class="ns" x="580" y="603" font-style="italic">备：Milvus（大规模 QPS）</text>

  <text class="nl" x="60"  y="623" font-size="12">索引</text>
  <text class="ns" x="180" y="623">HNSW（千万）· IVF-PQ（亿）· DiskANN（十亿）</text>

  <text class="nl" x="60"  y="643" font-size="12">Rerank</text>
  <text class="ns" x="180" y="643">BGE-reranker-v2-m3</text>
  <text class="ns" x="580" y="643" font-style="italic">备：Jina Reranker / Cohere Rerank</text>
</svg>
