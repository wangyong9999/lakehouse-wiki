<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-label="多模一体化湖仓整体架构（深色）">
  <title>多模一体化湖仓整体架构</title>
  <desc>七层横向带状架构。自底向上：数据源 → 入湖 → 湖仓底座 → Catalog 治理平面 → 计算与检索 → 消费。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9fa8da"/>
    </marker>
    <marker id="arrow-alt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c5cae9"/>
    </marker>
    <style>
      .ttl  { font-family: "Noto Sans SC","PingFang SC","Microsoft YaHei",system-ui,sans-serif; font-size: 17px; font-weight: 700; fill: #c5cae9; }
      .ttls { font-family: "Noto Sans SC","PingFang SC","Microsoft YaHei",system-ui,sans-serif; font-size: 10.5px; font-weight: 400; fill: #7986cb; letter-spacing: 0.3px; }
      .nl   { font-family: "Noto Sans SC","PingFang SC","Microsoft YaHei",system-ui,sans-serif; font-size: 14px; font-weight: 600; fill: #e8eaf6; }
      .ns   { font-family: "Noto Sans SC","PingFang SC","Microsoft YaHei",system-ui,sans-serif; font-size: 11px; font-weight: 400; fill: #b0bec5; }
      .cl   { font-family: "Noto Sans SC","PingFang SC","Microsoft YaHei",system-ui,sans-serif; font-size: 11px; font-weight: 700; fill: #7986cb; letter-spacing: 1px; }
    </style>
  </defs>

  <!-- ===== Layer bands (bottom to top) ===== -->
  <rect x="0" y="640" width="1200" height="80"  fill="#171927"/>
  <rect x="0" y="545" width="1200" height="80"  fill="#1a1d2e"/>
  <rect x="0" y="390" width="1200" height="140" fill="#232842"/>
  <rect x="0" y="305" width="1200" height="70"  fill="#2c3260"/>
  <rect x="0" y="130" width="1200" height="160" fill="#232842"/>
  <rect x="0" y="20"  width="1200" height="95"  fill="#1f2338"/>

  <!-- ===== Layer left-labels ===== -->
  <text class="ttl"  x="30" y="685">数据源</text>
  <text class="ttls" x="30" y="702">DATA SOURCES</text>

  <text class="ttl"  x="30" y="590">入湖</text>
  <text class="ttls" x="30" y="607">INGESTION</text>

  <text class="ttl"  x="30" y="455">湖仓底座</text>
  <text class="ttls" x="30" y="472">LAKE FOUNDATION</text>

  <text class="ttl"  x="30" y="342">Catalog</text>
  <text class="ttls" x="30" y="359">治理平面</text>

  <text class="ttl"  x="30" y="205">计算 + 检索</text>
  <text class="ttls" x="30" y="222">COMPUTE &amp; RETRIEVAL</text>

  <text class="ttl"  x="30" y="57">消费</text>
  <text class="ttls" x="30" y="74">CONSUMPTION</text>

  <!-- ===== Layer 1: 数据源 (3 nodes) ===== -->
  <g>
    <rect x="185" y="656" width="300" height="48" rx="8" fill="#1e2135" stroke="#5c6bc0" stroke-width="1.5"/>
    <text class="nl" x="335" y="677" text-anchor="middle">OLTP</text>
    <text class="ns" x="335" y="694" text-anchor="middle">MySQL · Postgres · Mongo</text>

    <rect x="535" y="656" width="300" height="48" rx="8" fill="#1e2135" stroke="#5c6bc0" stroke-width="1.5"/>
    <text class="nl" x="685" y="677" text-anchor="middle">日志 / 事件</text>
    <text class="ns" x="685" y="694" text-anchor="middle">埋点 · Kafka · Pulsar</text>

    <rect x="885" y="656" width="300" height="48" rx="8" fill="#1e2135" stroke="#5c6bc0" stroke-width="1.5"/>
    <text class="nl" x="1035" y="677" text-anchor="middle">多模文件</text>
    <text class="ns" x="1035" y="694" text-anchor="middle">图 · 音 · 视 · PDF</text>
  </g>

  <!-- ===== Layer 2: 入湖 (3 nodes) ===== -->
  <g>
    <rect x="185" y="561" width="300" height="48" rx="8" fill="#1e2135" stroke="#5c6bc0" stroke-width="1.5"/>
    <text class="nl" x="335" y="582" text-anchor="middle">Flink CDC</text>
    <text class="ns" x="335" y="599" text-anchor="middle">Debezium · binlog · WAL</text>

    <rect x="535" y="561" width="300" height="48" rx="8" fill="#1e2135" stroke="#5c6bc0" stroke-width="1.5"/>
    <text class="nl" x="685" y="582" text-anchor="middle">Spark 批</text>
    <text class="ns" x="685" y="599" text-anchor="middle">Bulk load · Backfill</text>

    <rect x="885" y="561" width="300" height="48" rx="8" fill="#1e2135" stroke="#5c6bc0" stroke-width="1.5"/>
    <text class="nl" x="1035" y="582" text-anchor="middle">对象上传</text>
    <text class="ns" x="1035" y="599" text-anchor="middle">S3 API · 多模原始资产</text>
  </g>

  <!-- ===== Layer 3: 湖仓底座 (3 nodes, emphasized) ===== -->
  <g>
    <rect x="170" y="408" width="300" height="104" rx="10" fill="#252a45" stroke="#7986cb" stroke-width="2"/>
    <text class="nl" x="320" y="445" text-anchor="middle">对象存储</text>
    <text class="ns" x="320" y="466" text-anchor="middle">S3 · GCS · OSS · ADLS</text>
    <text class="ns" x="320" y="484" text-anchor="middle" font-style="italic">不可变 · 强一致 · 弹性</text>

    <rect x="510" y="408" width="300" height="104" rx="10" fill="#252a45" stroke="#7986cb" stroke-width="2"/>
    <text class="nl" x="660" y="445" text-anchor="middle">Iceberg / Paimon</text>
    <text class="ns" x="660" y="466" text-anchor="middle">结构化事实表</text>
    <text class="ns" x="660" y="484" text-anchor="middle" font-style="italic">Snapshot · Manifest · Schema Evolution</text>

    <rect x="850" y="408" width="300" height="104" rx="10" fill="#252a45" stroke="#7986cb" stroke-width="2"/>
    <text class="nl" x="1000" y="445" text-anchor="middle">Lance / Iceberg + Puffin</text>
    <text class="ns" x="1000" y="466" text-anchor="middle">多模 + 向量表</text>
    <text class="ns" x="1000" y="484" text-anchor="middle" font-style="italic">ANN 索引 · 随机访问</text>
  </g>

  <!-- ===== Layer 4: Catalog (1 wide, focal) ===== -->
  <g>
    <rect x="300" y="318" width="600" height="44" rx="8" fill="#2f3663" stroke="#c5cae9" stroke-width="2"/>
    <text class="nl" x="600" y="339" text-anchor="middle">Unity · Polaris · Nessie</text>
    <text class="ns" x="600" y="356" text-anchor="middle">表 + 向量 + 模型 + Volume · 权限 · 血缘</text>
  </g>

  <!-- ===== Layer 5: 计算 + 检索 ===== -->
  <text class="cl" x="225" y="152">计算</text>
  <text class="cl" x="900" y="152">检索 + AI</text>

  <g>
    <rect x="170" y="162" width="108" height="52" rx="8" fill="#1e2135" stroke="#5c6bc0" stroke-width="1.5"/>
    <text class="nl" x="224" y="186" text-anchor="middle">Trino</text>
    <text class="ns" x="224" y="201" text-anchor="middle">交互</text>

    <rect x="286" y="162" width="108" height="52" rx="8" fill="#1e2135" stroke="#5c6bc0" stroke-width="1.5"/>
    <text class="nl" x="340" y="186" text-anchor="middle">Spark</text>
    <text class="ns" x="340" y="201" text-anchor="middle">批</text>

    <rect x="402" y="162" width="108" height="52" rx="8" fill="#1e2135" stroke="#5c6bc0" stroke-width="1.5"/>
    <text class="nl" x="456" y="186" text-anchor="middle">Flink</text>
    <text class="ns" x="456" y="201" text-anchor="middle">流</text>

    <rect x="518" y="162" width="108" height="52" rx="8" fill="#1e2135" stroke="#5c6bc0" stroke-width="1.5"/>
    <text class="nl" x="572" y="186" text-anchor="middle">DuckDB</text>
    <text class="ns" x="572" y="201" text-anchor="middle">开发</text>

    <rect x="634" y="162" width="108" height="52" rx="8" fill="#1e2135" stroke="#5c6bc0" stroke-width="1.5"/>
    <text class="nl" x="688" y="186" text-anchor="middle">StarRocks</text>
    <text class="ns" x="688" y="201" text-anchor="middle">加速</text>
  </g>

  <line x1="765" y1="162" x2="765" y2="270" stroke="#5c6bc0" stroke-width="1" stroke-dasharray="3 4"/>

  <g>
    <rect x="790" y="162" width="96" height="52" rx="8" fill="#1e2135" stroke="#5c6bc0" stroke-width="1.5"/>
    <text class="nl" x="838" y="186" text-anchor="middle">ANN</text>
    <text class="ns" x="838" y="201" text-anchor="middle">HNSW · IVF-PQ</text>

    <rect x="894" y="162" width="96" height="52" rx="8" fill="#1e2135" stroke="#5c6bc0" stroke-width="1.5"/>
    <text class="nl" x="942" y="186" text-anchor="middle">Hybrid</text>
    <text class="ns" x="942" y="201" text-anchor="middle">Dense+Sparse</text>

    <rect x="998" y="162" width="96" height="52" rx="8" fill="#1e2135" stroke="#5c6bc0" stroke-width="1.5"/>
    <text class="nl" x="1046" y="186" text-anchor="middle">Rerank</text>
    <text class="ns" x="1046" y="201" text-anchor="middle">Cross-encoder</text>

    <rect x="1102" y="162" width="76" height="52" rx="8" fill="#1e2135" stroke="#5c6bc0" stroke-width="1.5"/>
    <text class="nl" x="1140" y="186" text-anchor="middle">LLM</text>
    <text class="ns" x="1140" y="201" text-anchor="middle">vLLM · TGI</text>
  </g>

  <!-- ===== Layer 6: 消费 (4 nodes, top) ===== -->
  <g>
    <rect x="185" y="38" width="225" height="56" rx="8" fill="#1e2135" stroke="#5c6bc0" stroke-width="1.5"/>
    <text class="nl" x="297" y="63" text-anchor="middle">BI · 仪表盘</text>
    <text class="ns" x="297" y="80" text-anchor="middle">Superset · Tableau · 自研</text>

    <rect x="425" y="38" width="225" height="56" rx="8" fill="#1e2135" stroke="#5c6bc0" stroke-width="1.5"/>
    <text class="nl" x="537" y="63" text-anchor="middle">RAG · Agent</text>
    <text class="ns" x="537" y="80" text-anchor="middle">知识问答 · 工具调用</text>

    <rect x="665" y="38" width="225" height="56" rx="8" fill="#1e2135" stroke="#5c6bc0" stroke-width="1.5"/>
    <text class="nl" x="777" y="63" text-anchor="middle">ML 训练</text>
    <text class="ns" x="777" y="80" text-anchor="middle">PyTorch · Ray Train</text>

    <rect x="905" y="38" width="275" height="56" rx="8" fill="#1e2135" stroke="#5c6bc0" stroke-width="1.5"/>
    <text class="nl" x="1042" y="63" text-anchor="middle">多模检索</text>
    <text class="ns" x="1042" y="80" text-anchor="middle">图 ↔ 文 ↔ 音 跨模态查</text>
  </g>

  <!-- ===== Arrows ===== -->
  <line x1="335" y1="656" x2="335" y2="615"  stroke="#9fa8da" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="685" y1="656" x2="685" y2="615"  stroke="#9fa8da" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1035" y1="656" x2="1035" y2="615" stroke="#9fa8da" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="335" y1="561" x2="335" y2="518"  stroke="#9fa8da" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="685" y1="561" x2="685" y2="518"  stroke="#9fa8da" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1035" y1="561" x2="1035" y2="518" stroke="#9fa8da" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="320" y1="408" x2="400" y2="368"  stroke="#9fa8da" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="660" y1="408" x2="600" y2="368"  stroke="#9fa8da" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1000" y1="408" x2="800" y2="368" stroke="#9fa8da" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="500" y1="318" x2="400" y2="226"  stroke="#9fa8da" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="700" y1="318" x2="950" y2="226"  stroke="#9fa8da" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="1000" y1="408" x2="1000" y2="226" stroke="#c5cae9" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow-alt)"/>

  <line x1="400" y1="162" x2="297" y2="102"  stroke="#9fa8da" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="690" y1="162" x2="777" y2="102"  stroke="#9fa8da" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="950" y1="162" x2="537" y2="102"  stroke="#9fa8da" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1046" y1="162" x2="1042" y2="102" stroke="#9fa8da" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
