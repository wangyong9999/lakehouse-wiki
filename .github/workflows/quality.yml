name: Quality

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - '.markdownlint.jsonc'
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - '.markdownlint.jsonc'
      - '.github/workflows/quality.yml'

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: 'docs/**/*.md'

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: mkdocs build --strict

  links:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --verbose
            --max-concurrency 8
            --exclude-path .venv
            --exclude-path site
            'docs/**/*.md'
          fail: false

  version-scan:
    runs-on: ubuntu-latest
    continue-on-error: true  # non-blocking · advisory only
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - run: python scripts/version_scan.py
      - run: python scripts/version_scan.py --strict
        continue-on-error: true  # report, don't fail build

  unsourced-numbers-scan:
    runs-on: ubuntu-latest
    continue-on-error: true  # candidate generator · human review required
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/unsourced_numbers_scan.py | head -50
