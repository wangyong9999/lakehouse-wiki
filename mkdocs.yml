  - 研究前沿:
      - frontier/index.md
  - 横向对比:
      - compare/index.md
      - DB 存储引擎 vs 湖表: compare/db-engine-vs-lake-table.md
      - 四大表格式对比: compare/iceberg-vs-paimon-vs-hudi-vs-delta.md
      - ANN 索引对比: compare/ann-index-comparison.md
