      - Hive Metastore: catalog/hive-metastore.md
      - Iceberg REST Catalog: catalog/iceberg-rest-catalog.md
      - Nessie: catalog/nessie.md
      - Unity Catalog: catalog/unity-catalog.md
  - 查询引擎:
      - query-engines/index.md
      - Trino: query-engines/trino.md
      - Apache Spark: query-engines/spark.md
      - DuckDB: query-engines/duckdb.md
  - 多模检索:
      - retrieval/index.md
      - 向量数据库: retrieval/vector-database.md
      - Embedding: retrieval/embedding.md
      - 多模 Embedding: retrieval/multimodal-embedding.md
      - HNSW: retrieval/hnsw.md
      - IVF-PQ: retrieval/ivf-pq.md
      - Hybrid Search: retrieval/hybrid-search.md
      - Rerank: retrieval/rerank.md
      - Milvus: retrieval/milvus.md
      - LanceDB: retrieval/lancedb.md
  - AI 负载:
      - ai-workloads/index.md
      - RAG: ai-workloads/rag.md
      - Feature Store: ai-workloads/feature-store.md
  - BI 负载:
      - bi-workloads/index.md
  - 一体化架构:
